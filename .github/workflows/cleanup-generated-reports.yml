name: Cleanup Generated Reports

on:
  workflow_dispatch:
    inputs:
      target:
        description: Generated files to clean.
        required: true
        default: reports
        type: choice
        options:
          - reports
          - automation-output
          - signoff-plan
          - all
      apply:
        description: Actually delete files. Leave false for dry-run.
        required: true
        default: false
        type: boolean
      commit_changes:
        description: Commit cleanup changes back to the branch.
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod

      - name: Clean generated files
        run: |
          set -euo pipefail
          go run ./automation/clean-generated \
            -targets "${{ inputs.target }}" \
            -dry-run="${{ inputs.apply == false }}" \
            | tee cleanup-summary.md
          cat cleanup-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit cleanup
        if: ${{ inputs.apply && inputs.commit_changes }}
        run: |
          set -euo pipefail
          git add -A reports
          if git ls-files --error-unmatch signoff-plan.json >/dev/null 2>&1 || [ -e signoff-plan.json ]; then
            git add -A signoff-plan.json
          fi
          if git diff --cached --quiet; then
            echo "No tracked generated files changed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Clean generated sign-off reports"
          git push
